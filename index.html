<!DOCTYPE html>
<html>
<head>
  <title>🌳 Tree of Life 🌳</title>
  <style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: linear-gradient(180deg, #1e3c72, #2a5298);
    color: white;
  }
  
  @keyframes fadein {
	  from {
		  opacity: 0;
		  transform: translateY(10px);
	  }
	  to {
		  opacity: 1;
		  transform: translateY(0);
	  }
  }

  /* App container */
  .app-container {
    max-width: 420px;
    margin: auto;
    padding: 20px;
  }

  /* Header */
  .header {
    font-size: 24px;
    font-weight: bold;
    margin-bottom: 20px;
    text-align: center;
  }

  /* Card */
  .card {
    background: rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 15px;
    backdrop-filter: blur(12px);
	animation: fadein 0.5s ease;
  }

  /* Inputs */
  input {
    width: 100%;
    padding: 12px;
    margin-bottom: 10px;
    border-radius: 12px;
    border: none;
  }

  /* Buttons */
  button {
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(45deg, #ff6ec4, #7873f5);
    color: white;
    font-size: 16px;
    margin-top: 5px;
	position: relative;
	overflow: hidden;
  }
  
  button::after {
    content: "";
    position: absolute;
    width: 0;
    height: 0;
    background: rgba(255,255,255,0.5);
    border-radius: 50%;
    transform: scale(1);
    opacity: 0;
    transition: 0.5s;
  }
  
  button:active {
	  transform:scale(0.97);
  }
  
  button:active::after {
    width: 200px;
    height: 200px;
    opacity: 1;
    transition: 0s;
  }

  /* Bottom spacing */
  .spacer {
    height: 20px;
  }
  
  /* Chat container */
  #activity {
    max-height: 200px;
    overflow-y: auto;
    text-align: left;
  }

  /* Chat bubble */
  .message {
    background: rgba(255,255,255,0.15);
    padding: 10px;
    border-radius: 15px;
    margin: 5px 0;
    font-size: 14px;
    animation: fadeIn 0.4s ease;
  }

  /* Own message */
  .me {
    background: linear-gradient(45deg, #ff6ec4, #7873f5);
    text-align: right;
  }
  </style>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
</head>
<body style="text-align:center; font-family:sans-serif;">
	
<div class="app-container">

  <div class="header">🌳 Tree of Life</div>
  
  <img src="ChatGPT Tree of Life.png" width="70" alt="Image Generated by ChatGPT">

  <img src="ToL ChatGPT.png" width="300>
	
  <!-- Auth -->
  <div id="auth" class="card">
    <p style="font-size:14px;">
      New? Create account<br>
      Already have one? Sign in
    </p>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button onclick="signup()">Create Account</button>
    <button onclick="login()">Sign In</button>
  </div>

  <!-- App -->
  <div id="app" style="display:none;">
    <div class="card">
	  <p style="color:yellow;">Psalm 121:2 KJV My help cometh from the Lord, which made heaven and earth.</p>
      <p>👤 <span id="user"></span></p>
      <button onclick="logout()">Logout</button>
    </div>

    <div id="rivers"></div>
	
    <div class="card">
	  <h3>🌟 Activity</h3>
      <div id="activity"></div>
    </div>
	
	<div class="card">
		<h3>📊 Analytics</h3>
		<div id="analytics"></div>
	</div>
  </div>
  
  <div id="admin" class="card" style="display:none;">
    <h3>🛠️ Admin Panel</h3>

    <input id="targetUser" placeholder="User email">
  
    <select id="riverSelect">
      <option>Pistons</option>
      <option>Girona</option>
      <option>Hiddekel</option>
      <option>Euphoric</option>
    </select>

    <button onclick="assignRiver()">Assign River</button>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, onValue, push } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
import { 
  getAuth, 
  createUserWithEmailAndPassword, 
  signInWithEmailAndPassword, 
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// 🔑 Your config
const firebaseConfig = { apiKey: "AIzaSyAgmfrKCJ-dHhoGfidbTsL-L5MSbi3Q5vY",
  authDomain: "tree-of-life-48261.firebaseapp.com",
  databaseURL: "https://tree-of-life-48261-default-rtdb.firebaseio.com",
  projectId: "tree-of-life-48261",
  storageBucket: "tree-of-life-48261.firebasestorage.app",
  messagingSenderId: "82581077566",
  appId: "1:82581077566:web:e1bfdc1c4fdadc5e595b6f" };

const app = initializeApp(firebaseConfig);
const db = getDatabase();
const auth = getAuth();

let roomId= "default"; // later dynamic

roomId = prompt("Enter room name:");

// 🌊 Database
const activityRef = ref(db, `rooms/${roomId}/activity`)
const blessingsRef = ref(db, `rooms/${roomId}/blessings`);
const permissionRef = ref(db, 'permissions');
const analyticsRef = ref(db, `rooms/${roomId}/analytics`)

const riverPurpose = {
	Pistons: "Energy and Movement",
	Girona: "Growth and development",
	Hiddekel: "Wisdom and clarity",
	Euphoric: "Joy and celebration",
}

let blessings = {
  Pistons: 1,
  Girona: 1,
  Hiddekel: 1,
  Euphoric: 1
};

// 🔄 Real-time updates
onValue(activityRef, (snapshot) => {
  const data = snapshot.val();
  const container = document.getElementById("activity");

  container.innerHTML = "";

  if (!data) return;

  const currentUser = auth.currentUser?.email;

  Object.values(data).reverse().forEach(item => {
    const div = document.createElement("div");

    div.className = "message";
    if (item.user === currentUser) {
      div.classList.add("me");
    }

    div.innerText = `${item.user} blessed ${item.river} 🌊`;

    container.appendChild(div);
	container.scrollTop = container.scrollHeight;
  });
});

onValue(blessingsRef, (snapshot) => {
  if (snapshot.exists()) {
    blessings = snapshot.val();
  } else {
	  blessings = {
	        Pistons: 1,
	        Girona: 1,
	        Hiddekel: 1,
	        Euphoric: 1
	      };
		  set(blessingsRef, blessings);
  }
  render();
});

onValue(analyticsRef, (snapshot) => {
  const data = snapshot.val();
  const container = document.getElementById("analytics");

  container.innerHTML = "";

  if (!data) return;

  for (let river in data) {
    const div = document.createElement("div");
    div.innerText = `${river}: ${data[river]} blessings`;
    container.appendChild(div);
  }
});

window.assignRiver = function() {
  const email = document.getElementById("targetUser").value;
  const river = document.getElementById("riverSelect").value;

  set(ref(db, "permissions/" + email), [river]);

  alert("Assigned successfully ✅");
};

// 🔐 LOGIN
window.login = async function() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {
    await signInWithEmailAndPassword(auth, email, password);
	alert("Welcome back 🎉");
  } catch (error) {
    alert("Login failed: " + error.message); // 👈 shows what’s wrong
  }
};

// 🆕 SIGN UP
window.signup = async function() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {
    await createUserWithEmailAndPassword(auth, email, password);
	alert("Account created 🎉 Now click Login");
  } catch (error) {
    alert("Sign up failed: " + error.message);
  }
};

// 🚪 LOGOUT
window.logout = function() {
  signOut(auth);
};

// 👤 AUTH STATE
onAuthStateChanged(auth, (user) => {
  if (user) {
	console.log("Room:", roomId);
	
    document.getElementById("auth").style.display = "none";
    document.getElementById("app").style.display = "block";
    document.getElementById("user").innerText = user.email;
	
	render();
	
	if (user.email === ADMIN_EMAIL) {
	      document.getElementById("admin").style.display = "block";
	    }
  } else {
    document.getElementById("auth").style.display = "block";
    document.getElementById("app").style.display = "none";
  }
});

const ADMIN_EMAIL = "c51939173@gmail.com";

let userPermissions= {};

onValue (permissionRef, (snapshot) => {
	userPermissions = snapshot.val() || {};
});

// 🌸 Bless
const sound = new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3");

window.bless = function(river) {
	sound.play();
	const user = auth.currentUser.email;

	// 🔐 Check permission
	if (userPermissions[user] && !userPermissions[user].includes(river)) {
		alert(`⚖️ You are not assigned to ${river}. Each river has its purpose.`);
		return;
	}

	// Continue normally
	blessings[river]++;
	set(blessingsRef, blessings);
  
	onValue(analyticsRef, (snap) => {
		let data = snap.val() || {};
		data[river] = (data[river] || 0) + 1;
		set(analyticsRef, data);
	}, { onlyOnce: true });

	push(activityRef, { user, river, time: Date.now()
	});
};

function suggestRiver() {
  // find lowest blessing river
  let lowest = null;
  let min = Infinity;

  for (let river in blessings) {
    if (blessings[river] < min) {
      min = blessings[river];
      lowest = river;
    }
  }

  return lowest;
}

function animateValue(element, start, end, duration) {
  let startTime = null;

  function step(timestamp) {
    if (!startTime) startTime = timestamp;
    let progress = Math.min((timestamp - startTime) / duration, 1);

    element.innerText = Math.floor(progress * (end - start) + start);

    if (progress < 1) {
      requestAnimationFrame(step);
    }
  }

  requestAnimationFrame(step);
}

// 🎨 Render
function render() {
	const container = document.getElementById("rivers");
	container.innerHTML = "";
	
	const suggestion = suggestRiver();

	for (let river in blessings) {
		const div = document.createElement("div");
	
		div.className = "card";

		div.innerHTML = `
			<h3>${river} 🌊</h3>
			<p>Blessings: ${blessings[river]}</p>
			<p style="font-size:12px; opacity:0.8;">
				Purpose: ${riverPurpose[river]}
			</p>
			<button onclick="bless('${river}')">🌸 Bless</button>
		`;
		
		if (river === suggestion) {
			const tip = document.createElement("p");
			tip.style.color = "#FFD700"; // Optional: make it gold so it stands out
			tip.style.fontSize = "13px";
			tip.innerText = `💡 Suggested: ${suggestion}`;
			div.appendChild(tip);
		}
		
		container.appendChild(div);
	}
  
	if (navigator.vibrate) {
		navigator.vibrate(50);
	}
}
</script>

</body>
</html>
